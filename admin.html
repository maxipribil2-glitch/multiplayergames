<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLAYER LOBBY — Admin</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-fx" aria-hidden="true">
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-glow bg-glow-3"></div>
  <div class="particles">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>
</div>

<div class="wrap" style="max-width:480px;">

  <div class="topbar">
    <div class="marquee" style="font-size:14px;">ADMIN PANEL<span class="cursor"></span></div>
    <button class="ghost" id="logout-btn">LOGOUT</button>
  </div>

  <div class="error" id="guard" style="margin-bottom:18px;"></div>

  <div class="panel center hidden" id="admin-panel">
    <h2 style="text-align:left;">KILL-SWITCH</h2>
    <div class="status-line" id="status-text">...</div>
    <button id="toggle-btn" style="width:100%;">...</button>
    <div class="hint" style="margin-top:18px;">
      Schaltet die ganze Website für alle Besucher ab — sie sehen dann nur noch
      "Sorry, die Server sind gerade aus." Nochmal klicken schaltet alles wieder an.
    </div>
  </div>

</div>

<div class="map-sig">MAP</div>

<style>.hidden{display:none;}</style>
<script type="module" src="admin.js"></script>
</body>
</html>
