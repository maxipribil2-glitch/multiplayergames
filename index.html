<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLAYER LOBBY — Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-fx" aria-hidden="true">
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-glow bg-glow-3"></div>
  <div class="particles">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>
</div>
<div class="wrap center" style="max-width:440px; padding-top:64px;">

  <div class="marquee" style="justify-content:center;">PLAYER LOBBY<span class="cursor"></span></div>
  <div class="sub">log in oder registrier dich, um zu sehen wer online ist</div>

  <div class="panel" style="text-align:left;">

    <form id="login-form">
      <h2>LOGIN</h2>
      <label for="login-email">Email</label>
      <input id="login-email" type="email" required autocomplete="email">
      <label for="login-password">Passwort</label>
      <input id="login-password" type="password" required autocomplete="current-password">
      <div class="error" id="error-box"></div>
      <button type="submit" style="width:100%;">EINLOGGEN</button>
      <div class="hint">Noch kein Account? <a id="show-register">Registrieren</a></div>
    </form>

    <form id="register-form" class="hidden">
      <h2>REGISTRIEREN</h2>
      <label for="reg-username">Username</label>
      <input id="reg-username" type="text" required maxlength="20" autocomplete="nickname">
      <label for="reg-email">Email</label>
      <input id="reg-email" type="email" required autocomplete="email">
      <label for="reg-password">Passwort</label>
      <input id="reg-password" type="password" required minlength="6" autocomplete="new-password">
      <button type="submit" style="width:100%;">ACCOUNT ERSTELLEN</button>
      <div class="hint">Schon registriert? <a id="show-login">Zurück zum Login</a></div>
    </form>

  </div>
</div>

<div class="map-sig">MAP</div>

<style>.hidden{display:none;}</style>
<script type="module" src="maintenance.js"></script>
<script type="module" src="auth.js"></script>
</body>
</html>
