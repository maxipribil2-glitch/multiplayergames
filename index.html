<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLAYER LOBBY — Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap center" style="max-width:420px; padding-top:72px;">

  <div class="page-title" style="justify-content:center;"><span class="accent-dot"></span>PLAYER LOBBY</div>
  <div class="sub">log in oder registrier dich, um zu sehen wer online ist</div>

  <div class="panel" style="text-align:left;">

    <form id="login-form">
      <h2>Login</h2>
      <label for="login-username">Username</label>
      <input id="login-username" type="text" required autocomplete="username">
      <label for="login-password">Passwort</label>
      <input id="login-password" type="password" required autocomplete="current-password">
      <div class="error" id="error-box"></div>
      <button type="submit" style="width:100%;">Einloggen</button>
      <div class="hint">Noch kein Account? <a id="show-register">Registrieren</a></div>
    </form>

    <form id="register-form" class="hidden">
      <h2>Registrieren</h2>
      <label for="reg-username">Username</label>
      <input id="reg-username" type="text" required maxlength="20" pattern="[A-Za-z0-9_]+" autocomplete="username">
      <label for="reg-password">Passwort</label>
      <input id="reg-password" type="password" required minlength="6" autocomplete="new-password">
      <button type="submit" style="width:100%;">Account erstellen</button>
      <div class="hint">Schon registriert? <a id="show-login">Zurück zum Login</a></div>
    </form>

  </div>
</div>

<div class="map-sig">MAP</div>
<div class="version-tag">v1.0</div>

<style>.hidden{display:none;}</style>
<script type="module" src="maintenance.js"></script>
<script type="module" src="auth.js"></script>
</body>
</html>
