<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLAYER LOBBY — Game Room</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap" style="max-width:460px;">

  <div class="topbar">
    <div class="page-title" style="font-size:17px;"><span class="accent-dot" style="background:var(--pu);"></span>Tic-Tac-Toe</div>
    <button class="ghost" id="leave-btn">Verlassen</button>
  </div>

  <div class="panel center">
    <div class="sub" id="names" style="margin-bottom:18px;">Lade Raum...</div>
    <div class="board" id="board"></div>
    <div id="status" style="margin-bottom:14px;">...</div>
    <button id="rematch-btn" class="hidden">Rematch</button>
  </div>

</div>

<div class="map-sig">MAP</div>
<div class="version-tag">v1.0</div>

<style>.hidden{display:none;}</style>
<script type="module" src="maintenance.js"></script>
<script type="module" src="game.js"></script>
</body>
</html>
